<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Remote Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }

  /* Login Screen */
  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .login-box { background: #16213e; padding: 40px; border-radius: 12px; text-align: center; min-width: 320px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .login-box h1 { font-size: 24px; margin-bottom: 8px; }
  .login-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
  .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #333; border-radius: 8px; background: #0f1629; color: #eee; font-size: 16px; outline: none; margin-bottom: 16px; }
  .login-box input:focus { border-color: #4a9eff; }
  .login-box button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #4a9eff; color: #fff; font-size: 16px; cursor: pointer; font-weight: 600; }
  .login-box button:hover { background: #3a8eef; }
  .login-box button:disabled { background: #555; cursor: not-allowed; }
  .login-error { color: #ff6b6b; margin-top: 12px; font-size: 14px; display: none; }

  /* Stream Screen */
  #stream-screen { display: none; width: 100vw; height: 100vh; position: relative; flex-direction: column; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #000; }
  #canvas { width: 100%; height: 100%; object-fit: contain; cursor: default; display: block; }

  /* Status Bar */
  #status-bar { position: fixed; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: monospace; z-index: 100; display: none; }

  /* Shutdown Button */
  #shutdown-btn { position: fixed; top: 8px; left: 8px; background: rgba(180,40,40,0.8); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; z-index: 100; font-weight: 600; }
  #shutdown-btn:hover { background: rgba(220,50,50,0.9); }

  /* Confirm Dialog */
  #confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center; }
  .confirm-box { background: #16213e; padding: 32px; border-radius: 12px; text-align: center; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .confirm-box p { margin-bottom: 20px; font-size: 16px; }
  .confirm-btns { display: flex; gap: 12px; }
  .confirm-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #confirm-yes { background: #c0392b; color: #fff; }
  #confirm-yes:hover { background: #e74c3c; }
  #confirm-no { background: #444; color: #ddd; }
  #confirm-no:hover { background: #555; }

  /* Mobile Toolbar — hidden by default, shown via JS based on UA */
  #mobile-toolbar { display: none; background: #16213e; border-top: 1px solid #333; padding: 6px 8px; z-index: 50; }
  #mobile-toolbar .toolbar-row { display: flex; gap: 6px; align-items: center; }
  #mobile-toolbar .toolbar-row + .toolbar-row { margin-top: 6px; }
  .tb-btn { background: #2a2a4a; color: #ddd; border: 1px solid #444; border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: monospace; cursor: pointer; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  .tb-btn:active { background: #4a9eff; color: #fff; }
  .tb-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
  .tb-btn.wide { flex: 1; text-align: center; }
  .tb-sep { width: 1px; height: 28px; background: #444; flex-shrink: 0; }
  #hidden-input { position: fixed; left: -9999px; top: -9999px; opacity: 0; width: 1px; height: 1px; }

  /* Reconnect Overlay */
  #reconnect-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
  .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #reconnect-msg { font-size: 16px; color: #ccc; }

  body.is-mobile #mobile-toolbar { display: block; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>Remote Desktop</h1>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="password-input" placeholder="비밀번호" autofocus>
    <button id="connect-btn">연결</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- Stream -->
<div id="stream-screen">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="status-bar">
    <span id="fps-display">0 FPS</span> |
    <span id="quality-display">Q:75</span>
  </div>
  <button id="shutdown-btn">종료</button>

  <!-- Mobile Toolbar -->
  <div id="mobile-toolbar">
    <div class="toolbar-row">
      <button class="tb-btn" id="tb-keyboard">⌨️ 키보드</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="tb-desk-left">◀ 데스크톱</button>
      <button class="tb-btn" id="tb-desk-right">데스크톱 ▶</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="tb-right-click">우클릭</button>
    </div>
    <div class="toolbar-row">
      <button class="tb-btn" data-key="Escape">ESC</button>
      <button class="tb-btn" data-key="Tab">Tab</button>
      <button class="tb-btn" data-key="Enter">Enter</button>
      <button class="tb-btn" data-key="Backspace">⌫</button>
      <button class="tb-btn" data-key="Space">Space</button>
      <div class="tb-sep"></div>
      <button class="tb-btn tb-mod" data-mod="ctrl">Ctrl</button>
      <button class="tb-btn tb-mod" data-mod="alt">Alt</button>
      <button class="tb-btn tb-mod" data-mod="meta">⌘</button>
      <button class="tb-btn tb-mod" data-mod="shift">⇧</button>
    </div>
  </div>
</div>

<!-- Hidden input for mobile keyboard -->
<input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

<!-- Confirm Dialog -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <p>원격 데스크톱 서버를 종료할까요?</p>
    <p style="font-size:12px;color:#888;margin-top:-12px;margin-bottom:16px;">서버가 종료되면 다시 접속할 수 없습니다.</p>
    <div class="confirm-btns">
      <button id="confirm-no">취소</button>
      <button id="confirm-yes">종료</button>
    </div>
  </div>
</div>

<!-- Reconnect Overlay -->
<div id="reconnect-overlay">
  <div class="spinner"></div>
  <div id="reconnect-msg">재연결 중...</div>
</div>

<script>
(function() {
  'use strict';

  // --- State ---
  var ws = null;
  var token = null;
  var screenWidth = 1920;
  var screenHeight = 1080;
  var reconnectAttempts = 0;
  var MAX_RECONNECT = 10;
  var frameCount = 0;
  var lastFpsTime = Date.now();
  var showStatus = false;
  var isMobile = /Android|iPhone|iPad|iPod|Mobile|Opera Mini|IEMobile/i.test(navigator.userAgent);
  if (isMobile) document.body.classList.add('is-mobile');
  var rightClickMode = false;
  var stickyMods = { ctrl: false, alt: false, meta: false, shift: false };

  // --- Elements ---
  var loginScreen = document.getElementById('login-screen');
  var streamScreen = document.getElementById('stream-screen');
  var passwordInput = document.getElementById('password-input');
  var connectBtn = document.getElementById('connect-btn');
  var loginError = document.getElementById('login-error');
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var statusBar = document.getElementById('status-bar');
  var fpsDisplay = document.getElementById('fps-display');
  var qualityDisplay = document.getElementById('quality-display');
  var reconnectOverlay = document.getElementById('reconnect-overlay');
  var reconnectMsg = document.getElementById('reconnect-msg');
  var hiddenInput = document.getElementById('hidden-input');

  // --- Auth ---
  async function authenticate() {
    var pw = passwordInput.value;
    if (!pw) return;
    connectBtn.disabled = true;
    loginError.style.display = 'none';

    try {
      var res = await fetch('/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      var data = await res.json();
      if (data.type === 'auth-ok') {
        token = data.token;
        loginScreen.style.display = 'none';
        streamScreen.style.display = 'flex';
        connectWebSocket();
      } else {
        loginError.style.display = 'block';
        connectBtn.disabled = false;
      }
    } catch (err) {
      loginError.textContent = '연결 실패. 다시 시도해주세요.';
      loginError.style.display = 'block';
      connectBtn.disabled = false;
    }
  }

  connectBtn.addEventListener('click', authenticate);
  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') authenticate();
  });

  // --- WebSocket ---
  function getWsUrl() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return proto + '//' + location.host;
  }

  function connectWebSocket() {
    ws = new WebSocket(getWsUrl());

    ws.onopen = function() {
      reconnectAttempts = 0;
      reconnectOverlay.style.display = 'none';
      ws.send(JSON.stringify({ type: 'auth', token: token }));
    };

    ws.onmessage = function(event) {
      var msg;
      try { msg = JSON.parse(event.data); } catch(e) { return; }

      switch (msg.type) {
        case 'auth-fail':
          token = null;
          loginScreen.style.display = 'flex';
          streamScreen.style.display = 'none';
          loginError.textContent = '세션 만료. 다시 로그인해주세요.';
          loginError.style.display = 'block';
          connectBtn.disabled = false;
          break;

        case 'screen-info':
          screenWidth = msg.width;
          screenHeight = msg.height;
          canvas.width = msg.width;
          canvas.height = msg.height;
          break;

        case 'frame':
          renderFrame(msg.data);
          break;

        case 'quality-adjust':
          qualityDisplay.textContent = 'Q:' + msg.quality;
          break;
      }
    };

    ws.onclose = function() {
      if (!token) return;
      attemptReconnect();
    };

    ws.onerror = function() {};
  }

  function attemptReconnect() {
    if (reconnectAttempts >= MAX_RECONNECT) {
      reconnectMsg.textContent = '연결 실패. 페이지를 새로고침 해주세요.';
      reconnectOverlay.style.display = 'flex';
      return;
    }
    reconnectAttempts++;
    reconnectMsg.textContent = '재연결 중... (' + reconnectAttempts + '/' + MAX_RECONNECT + ')';
    reconnectOverlay.style.display = 'flex';
    setTimeout(connectWebSocket, 3000);
  }

  // --- Rendering ---
  var img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    frameCount++;
    var now = Date.now();
    if (now - lastFpsTime >= 1000) {
      fpsDisplay.textContent = frameCount + ' FPS';
      frameCount = 0;
      lastFpsTime = now;
    }
  };

  function renderFrame(base64Data) {
    img.src = 'data:image/jpeg;base64,' + base64Data;
  }

  // --- Input Helpers ---
  function getCanvasRatio(e) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height)),
    };
  }

  function getButton(e) {
    if (e.button === 2) return 'right';
    if (e.button === 1) return 'middle';
    return 'left';
  }

  function sendInput(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  function getStickyMods() {
    var mods = [];
    if (stickyMods.ctrl) mods.push('ctrl');
    if (stickyMods.alt) mods.push('alt');
    if (stickyMods.meta) mods.push('meta');
    if (stickyMods.shift) mods.push('shift');
    return mods;
  }

  function clearStickyMods() {
    stickyMods.ctrl = false;
    stickyMods.alt = false;
    stickyMods.meta = false;
    stickyMods.shift = false;
    document.querySelectorAll('.tb-mod').forEach(function(b) { b.classList.remove('active'); });
  }

  function sendKey(key, extraMods) {
    var mods = getStickyMods();
    if (extraMods) mods = mods.concat(extraMods);
    sendInput({ type: 'key-down', key: key, modifiers: mods });
    sendInput({ type: 'key-up', key: key });
    clearStickyMods();
  }

  // --- Input: Mouse (Desktop) ---
  var lastMoveTime = 0;
  canvas.addEventListener('mousemove', function(e) {
    var now = Date.now();
    if (now - lastMoveTime < 30) return;
    lastMoveTime = now;
    var r = getCanvasRatio(e);
    sendInput({ type: 'mouse-move', x: r.x, y: r.y });
  });

  canvas.addEventListener('mousedown', function(e) {
    e.preventDefault();
    var r = getCanvasRatio(e);
    sendInput({ type: 'mouse-down', x: r.x, y: r.y, button: getButton(e) });
  });

  canvas.addEventListener('mouseup', function(e) {
    e.preventDefault();
    var r = getCanvasRatio(e);
    sendInput({ type: 'mouse-up', x: r.x, y: r.y, button: getButton(e) });
  });

  canvas.addEventListener('click', function(e) {
    e.preventDefault();
    var r = getCanvasRatio(e);
    sendInput({ type: 'mouse-click', x: r.x, y: r.y, button: getButton(e) });
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var r = getCanvasRatio(e);
    var deltaY = Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY), 10);
    sendInput({ type: 'mouse-scroll', x: r.x, y: r.y, deltaY: deltaY });
  }, { passive: false });

  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // --- Input: Keyboard (Desktop) ---
  function getModifiers(e) {
    var mods = [];
    if (e.ctrlKey) mods.push('ctrl');
    if (e.shiftKey) mods.push('shift');
    if (e.altKey) mods.push('alt');
    if (e.metaKey) mods.push('meta');
    return mods;
  }

  document.addEventListener('keydown', function(e) {
    if (streamScreen.style.display === 'none') return;
    // Status toggle
    if (e.key === 'i' && !e.ctrlKey && !e.altKey && !e.metaKey && e.target === document.body) {
      showStatus = !showStatus;
      statusBar.style.display = showStatus ? 'block' : 'none';
      return;
    }
    // Prevent browser shortcuts
    if (['F5', 'F11', 'F12'].includes(e.key) || (e.ctrlKey && ['r', 'w', 't', 'n', 'l'].includes(e.key.toLowerCase()))) {
      e.preventDefault();
    }
    // Don't send if typing in hidden input on mobile (handled separately)
    if (e.target === hiddenInput) return;
    sendInput({ type: 'key-down', key: e.key, modifiers: getModifiers(e) });
  });

  document.addEventListener('keyup', function(e) {
    if (streamScreen.style.display === 'none') return;
    if (e.target === hiddenInput) return;
    sendInput({ type: 'key-up', key: e.key });
  });

  // --- Input: Touch (Mobile) ---
  var touchStartPos = null;
  var touchStartTime = 0;
  var touchMoved = false;
  var lastTouchMoveTime = 0;
  var TOUCH_TAP_THRESHOLD = 10; // pixels

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      var touch = e.touches[0];
      var r = getCanvasRatio(touch);
      touchStartPos = { x: r.x, y: r.y, px: touch.clientX, py: touch.clientY };
      touchStartTime = Date.now();
      touchMoved = false;
      // Move cursor to position
      sendInput({ type: 'mouse-move', x: r.x, y: r.y });
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var now = Date.now();
    if (now - lastTouchMoveTime < 30) return;
    lastTouchMoveTime = now;

    if (e.touches.length === 1 && touchStartPos) {
      var touch = e.touches[0];
      var dx = Math.abs(touch.clientX - touchStartPos.px);
      var dy = Math.abs(touch.clientY - touchStartPos.py);
      if (dx > TOUCH_TAP_THRESHOLD || dy > TOUCH_TAP_THRESHOLD) {
        if (!touchMoved) {
          // Drag started
          touchMoved = true;
          sendInput({ type: 'mouse-down', x: touchStartPos.x, y: touchStartPos.y, button: 'left' });
        }
        var r = getCanvasRatio(touch);
        sendInput({ type: 'mouse-move', x: r.x, y: r.y });
      }
    } else if (e.touches.length === 2) {
      // Pinch → scroll
      var t1 = e.touches[0];
      var t2 = e.touches[1];
      var dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      if (!canvas._lastPinchDist) {
        canvas._lastPinchDist = dist;
        return;
      }
      var delta = canvas._lastPinchDist - dist;
      canvas._lastPinchDist = dist;
      if (Math.abs(delta) > 2) {
        var midR = getCanvasRatio({
          clientX: (t1.clientX + t2.clientX) / 2,
          clientY: (t1.clientY + t2.clientY) / 2,
        });
        sendInput({ type: 'mouse-scroll', x: midR.x, y: midR.y, deltaY: delta > 0 ? 3 : -3 });
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    canvas._lastPinchDist = null;

    if (touchStartPos) {
      if (touchMoved) {
        // End drag
        var r = touchStartPos;
        if (e.changedTouches.length > 0) {
          r = getCanvasRatio(e.changedTouches[0]);
        }
        sendInput({ type: 'mouse-up', x: r.x, y: r.y, button: 'left' });
      } else {
        // Tap — send click
        var btn = rightClickMode ? 'right' : 'left';
        sendInput({ type: 'mouse-click', x: touchStartPos.x, y: touchStartPos.y, button: btn });
        if (rightClickMode) {
          rightClickMode = false;
          document.getElementById('tb-right-click').classList.remove('active');
        }
      }
      touchStartPos = null;
      touchMoved = false;
    }
  }, { passive: false });

  // Long press = right click
  var longPressTimer = null;
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      longPressTimer = setTimeout(function() {
        if (touchStartPos && !touchMoved) {
          sendInput({ type: 'mouse-click', x: touchStartPos.x, y: touchStartPos.y, button: 'right' });
          touchStartPos = null; // Prevent tap on touchend
        }
      }, 600);
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', function() {
    clearTimeout(longPressTimer);
  }, { passive: true });

  canvas.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
  }, { passive: true });

  // --- Mobile Toolbar ---

  // Keyboard button
  document.getElementById('tb-keyboard').addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    hiddenInput.focus();
  });

  // Hidden input captures mobile keyboard input
  hiddenInput.addEventListener('input', function(e) {
    var val = hiddenInput.value;
    if (val.length > 0) {
      // Send each character
      for (var i = 0; i < val.length; i++) {
        sendKey(val[i]);
      }
      hiddenInput.value = '';
    }
  });

  hiddenInput.addEventListener('keydown', function(e) {
    // Handle special keys from mobile keyboard
    if (['Backspace', 'Enter', 'Tab', 'Escape'].includes(e.key)) {
      e.preventDefault();
      sendKey(e.key);
    }
  });

  // Desktop switch buttons (Ctrl+Left / Ctrl+Right on macOS)
  document.getElementById('tb-desk-left').addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    sendInput({ type: 'key-down', key: 'ArrowLeft', modifiers: ['ctrl'] });
    sendInput({ type: 'key-up', key: 'ArrowLeft' });
  });

  document.getElementById('tb-desk-right').addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    sendInput({ type: 'key-down', key: 'ArrowRight', modifiers: ['ctrl'] });
    sendInput({ type: 'key-up', key: 'ArrowRight' });
  });

  // Right-click toggle
  document.getElementById('tb-right-click').addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    rightClickMode = !rightClickMode;
    this.classList.toggle('active', rightClickMode);
  });

  // Special key buttons
  document.querySelectorAll('.tb-btn[data-key]').forEach(function(btn) {
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      e.stopPropagation();
      sendKey(btn.getAttribute('data-key'));
    });
  });

  // Sticky modifier buttons
  document.querySelectorAll('.tb-mod').forEach(function(btn) {
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var mod = btn.getAttribute('data-mod');
      stickyMods[mod] = !stickyMods[mod];
      btn.classList.toggle('active', stickyMods[mod]);
    });
  });

  // --- Shutdown ---
  var confirmOverlay = document.getElementById('confirm-overlay');
  var shutdownBtn = document.getElementById('shutdown-btn');

  shutdownBtn.addEventListener('click', function(e) {
    e.preventDefault();
    confirmOverlay.style.display = 'flex';
  });
  // Also handle touch for mobile
  shutdownBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    confirmOverlay.style.display = 'flex';
  });

  document.getElementById('confirm-no').addEventListener('click', function() {
    confirmOverlay.style.display = 'none';
  });

  document.getElementById('confirm-yes').addEventListener('click', async function() {
    try {
      await fetch('/shutdown', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
      });
    } catch (e) { /* server is shutting down */ }
    confirmOverlay.style.display = 'none';
    token = null; // prevent reconnect
    if (ws) ws.close();
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa;font-size:18px;">서버가 종료되었습니다.</div>';
